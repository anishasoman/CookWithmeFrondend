
<div class="container-fluid py-4">

  <div class="row">

    <!-- FILTERS -->
    <div class="col-lg-3 mb-4">
      <div class="filter-card">
        <h6 class="mb-3">FILTERS</h6>

        <button class="btn filter-btn active w-100 mb-2">
          All Recipes
        </button>

        <div class="dropdown mb-2">
          <button class="btn filter-btn dropdown-toggle w-100" data-bs-toggle="dropdown">
            Cuisine Type
          </button>
          <ul class="dropdown-menu w-100">
            @for (item of cuisinetype; track $index) {
            <li (click)="filterRecipe('cuisine',item)"><button class="dropdown-item">{{item}}</button></li>
            }
          </ul>
        </div>

        <div class="dropdown">
          <button class="btn filter-btn dropdown-toggle w-100" data-bs-toggle="dropdown">
            Meal Type
          </button>
          <ul class="dropdown-menu w-100">
            @for (item of updatedMealArray; track $index) {
             <li (click)="filterRecipe('mealType',item)"><button class="dropdown-item">{{item}}</button></li>
            }
          </ul>
        </div>
      </div>
    </div>

    <!-- RECIPES -->
    <div class="col-lg-9">

      <!-- HEADER -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="page-title">All Recipes</h3>

        <input
        [(ngModel)]="searchKey"
          type="text"
          class="form-control search-input"
          placeholder="Search recipes..."
  
        />
      </div>

      <!-- GRID -->
      <div class="row g-4">
     @for (item of recipes| paginate: { itemsPerPage: 9, currentPage: p } | search:searchKey;  track $index) {
        <div class="col-md-6 col-lg-4" (click)="viewrecipe(item._id)">
          <div class="recipe-card">
            <img [src]="item.image" alt="">
            <h6>{{ item.name }}</h6>
          </div>
        </div>
     }
      </div>
    </div>
        <div  class="text-center mt-5">
      <pagination-controls (pageChange)="p = $event"></pagination-controls>
    </div>
  </div>
</div>
