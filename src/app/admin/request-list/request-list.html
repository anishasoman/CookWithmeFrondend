<div class="row m-4 main-wrapper">
  <div class="col-lg-2 col-md-3 col-12 sidebar-col">
    <app-sidebar></app-sidebar>
  </div>

  <div class="col-lg-10 col-md-9 col-12 content-col">
    <div class="request-container">

      <h2 class="page-title">All Testimony List</h2>

      <div class="table-card">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>About</th>
                <th>Message</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody>
              @for (item of feedbacks; track $index) {
                <tr>
                  <td>{{ $index + 1 }}</td>
                  <td class="name">{{ item.name }}</td>
                  <td>{{ item.about }}</td>
                  <td class="message-cell">{{ item.message }}</td>
                  <td>

                    @if(item.status=='pending'){
                      <div class="action-buttons">
                        <button class="approve-btn"
                          (click)="updateStatus(item, 'approved')">
                          Approve
                        </button>

                        <button class="reject-btn"
                          (click)="updateStatus(item, 'rejected')">
                          Reject
                        </button>
                      </div>
                    }

                    @else if(item.status=='approved'){
                      <span class="badge approved">
                        Approved
                      </span>
                    }

                    @else {
                      <span class="badge rejected">
                        Rejected
                      </span>
                    }

                  </td>
                </tr>
              }
            </tbody>

          </table>
        </div>
      </div>

    </div>
  </div>
</div>
